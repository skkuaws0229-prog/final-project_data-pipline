<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#111"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1168CC"/>
    </marker>
    <style>
      .title { font: 700 25px Arial, Helvetica, sans-serif; fill: #111827; }
      .account-title { font: 700 16px Arial, Helvetica, sans-serif; fill: #111827; }
      .label { font: 600 13px Arial, Helvetica, sans-serif; fill: #111827; }
      .small { font: 12px Arial, Helvetica, sans-serif; fill: #111827; }
      .tiny { font: 11px Arial, Helvetica, sans-serif; fill: #111827; }
      .aws-badge { fill: #111827; }
      .aws-text { font: 700 10px Arial, Helvetica, sans-serif; fill: #fff; }
      .box { fill: #fff; stroke: #111827; stroke-width: 1.4; }
      .dashed { fill: #fff; stroke: #2563EB; stroke-width: 1.8; stroke-dasharray: 7 6; }
      .svc-orange { fill: #FF9900; stroke: #C56A00; stroke-width: 1; }
      .svc-green { fill: #3FA34D; stroke: #237A31; stroke-width: 1; }
      .svc-blue { fill: #147EBA; stroke: #0B5A86; stroke-width: 1; }
      .svc-purple { fill: #8B5CF6; stroke: #6D28D9; stroke-width: 1; }
      .svc-teal { fill: #00A3A3; stroke: #007575; stroke-width: 1; }
      .svc-red { fill: #E05264; stroke: #B83545; stroke-width: 1; }
      .svc-gray { fill: #6B7280; stroke: #374151; stroke-width: 1; }
      .svc-text { font: 700 12px Arial, Helvetica, sans-serif; fill: #fff; text-anchor: middle; }
      .num { fill: #FF6A00; stroke: #D04F00; stroke-width: 1; }
      .num-text { font: 700 14px Arial, Helvetica, sans-serif; fill: #fff; text-anchor: middle; dominant-baseline: central; }
      .flow { fill: none; stroke: #111; stroke-width: 1.4; marker-end: url(#arrow); }
      .flow-blue { fill: none; stroke: #1168CC; stroke-width: 2; marker-end: url(#arrowBlue); }
      .flow-dash { fill: none; stroke: #111; stroke-width: 1.3; stroke-dasharray: 6 5; marker-end: url(#arrow); }
      .note { font: 11px Arial, Helvetica, sans-serif; fill: #374151; }
    </style>
  </defs>

  <rect width="1800" height="980" fill="#ffffff"/>
  <text x="900" y="35" class="title" text-anchor="middle">Precision Drug Repurposing Platform - AWS Workflow Architecture</text>

  <!-- External personas -->
  <g transform="translate(20,175)">
    <circle cx="35" cy="25" r="18" fill="#fff" stroke="#111" stroke-width="1.3"/>
    <path d="M5 80 Q35 45 65 80 L65 103 L5 103 Z" fill="#fff" stroke="#111" stroke-width="1.3"/>
    <text x="35" y="128" class="label" text-anchor="middle">Researcher</text>
  </g>
  <g transform="translate(20,715)">
    <circle cx="35" cy="25" r="18" fill="#fff" stroke="#111" stroke-width="1.3"/>
    <path d="M5 80 Q35 45 65 80 L65 103 L5 103 Z" fill="#fff" stroke="#111" stroke-width="1.3"/>
    <text x="35" y="128" class="label" text-anchor="middle">Admin / Team</text>
  </g>
  <g transform="translate(1710,170)">
    <circle cx="35" cy="25" r="18" fill="#fff" stroke="#111" stroke-width="1.3"/>
    <path d="M5 80 Q35 45 65 80 L65 103 L5 103 Z" fill="#fff" stroke="#111" stroke-width="1.3"/>
    <text x="35" y="128" class="label" text-anchor="middle">Frontend Dev</text>
  </g>

  <!-- Accounts / zones -->
  <rect x="120" y="70" width="1260" height="610" fill="#FAFAFA" stroke="#111827" stroke-width="1.5"/>
  <rect x="125" y="75" width="25" height="25" class="aws-badge"/><text x="137.5" y="92" class="aws-text" text-anchor="middle">aws</text>
  <text x="160" y="92" class="account-title">Drug Service AWS Account / EC2 Runtime</text>

  <rect x="1410" y="70" width="330" height="610" fill="#FAFAFA" stroke="#111827" stroke-width="1.5"/>
  <rect x="1415" y="75" width="25" height="25" class="aws-badge"/><text x="1427.5" y="92" class="aws-text" text-anchor="middle">aws</text>
  <text x="1450" y="92" class="account-title">Future Automation Layer</text>

  <rect x="120" y="720" width="1620" height="200" fill="#FAFAFA" stroke="#111827" stroke-width="1.5"/>
  <rect x="125" y="725" width="25" height="25" class="aws-badge"/><text x="137.5" y="742" class="aws-text" text-anchor="middle">aws</text>
  <text x="160" y="742" class="account-title">Governance / Handoff / Backup</text>

  <!-- Frontend / API -->
  <rect x="170" y="125" width="220" height="140" class="box"/>
  <text x="280" y="148" class="label" text-anchor="middle">React Frontend</text>
  <rect x="230" y="165" width="70" height="55" rx="8" class="svc-blue"/>
  <text x="265" y="189" class="svc-text">UI</text>
  <text x="280" y="239" class="small" text-anchor="middle">Overview / Candidates</text>
  <text x="280" y="255" class="small" text-anchor="middle">KG Graph / AlphaFold / Chatbot</text>

  <rect x="460" y="125" width="240" height="140" class="box"/>
  <text x="580" y="148" class="label" text-anchor="middle">Amazon EC2</text>
  <rect x="545" y="165" width="70" height="55" rx="8" class="svc-orange"/>
  <text x="580" y="187" class="svc-text">EC2</text>
  <text x="580" y="239" class="small" text-anchor="middle">Docker Compose Host</text>
  <text x="580" y="255" class="small" text-anchor="middle">api / db / graph / search</text>

  <rect x="760" y="125" width="260" height="140" class="box"/>
  <text x="890" y="148" class="label" text-anchor="middle">FastAPI Team API</text>
  <rect x="855" y="165" width="70" height="55" rx="8" class="svc-teal"/>
  <text x="890" y="187" class="svc-text">API</text>
  <text x="890" y="239" class="small" text-anchor="middle">:8010 / CORS 5174</text>
  <text x="890" y="255" class="small" text-anchor="middle">single backend contract</text>

  <!-- Database services -->
  <rect x="170" y="335" width="170" height="130" class="box"/>
  <text x="255" y="358" class="label" text-anchor="middle">PostgreSQL</text>
  <rect x="220" y="377" width="70" height="55" rx="8" class="svc-green"/>
  <text x="255" y="398" class="svc-text">RDS</text>
  <text x="255" y="448" class="tiny" text-anchor="middle">candidates / ADMET</text>
  <text x="255" y="462" class="tiny" text-anchor="middle">AlphaFold metadata</text>

  <rect x="380" y="335" width="170" height="130" class="box"/>
  <text x="465" y="358" class="label" text-anchor="middle">Neo4j KG</text>
  <rect x="430" y="377" width="70" height="55" rx="8" class="svc-green"/>
  <text x="465" y="398" class="svc-text">KG</text>
  <text x="465" y="448" class="tiny" text-anchor="middle">Disease / Drug</text>
  <text x="465" y="462" class="tiny" text-anchor="middle">Target / Pathway</text>

  <rect x="590" y="335" width="170" height="130" class="box"/>
  <text x="675" y="358" class="label" text-anchor="middle">OpenSearch</text>
  <rect x="640" y="377" width="70" height="55" rx="8" class="svc-blue"/>
  <text x="675" y="398" class="svc-text">OS</text>
  <text x="675" y="448" class="tiny" text-anchor="middle">text retrieval</text>
  <text x="675" y="462" class="tiny" text-anchor="middle">RAG evidence</text>

  <rect x="800" y="335" width="190" height="130" class="box"/>
  <text x="895" y="358" class="label" text-anchor="middle">Amazon S3</text>
  <rect x="860" y="377" width="70" height="55" rx="8" class="svc-green"/>
  <text x="895" y="398" class="svc-text">S3</text>
  <text x="895" y="448" class="tiny" text-anchor="middle">raw / results / reports</text>
  <text x="895" y="462" class="tiny" text-anchor="middle">AlphaFold .cif</text>

  <rect x="1030" y="335" width="270" height="130" class="box"/>
  <text x="1165" y="358" class="label" text-anchor="middle">Loaders / Indexers</text>
  <rect x="1090" y="377" width="70" height="55" rx="8" class="svc-gray"/>
  <text x="1125" y="398" class="svc-text">ETL</text>
  <text x="1190" y="390" class="small">CSV / Markdown parse</text>
  <text x="1190" y="408" class="small">Postgres load</text>
  <text x="1190" y="426" class="small">Neo4j CSV import</text>
  <text x="1190" y="444" class="small">OpenSearch index</text>

  <!-- APIs -->
  <rect x="170" y="520" width="1130" height="120" class="box"/>
  <text x="735" y="545" class="label" text-anchor="middle">Implemented API Surface</text>
  <text x="205" y="575" class="small">/diseases</text>
  <text x="205" y="595" class="small">/v1/diseases/{disease}/final-candidates</text>
  <text x="205" y="615" class="small">/api/diseases/{disease}/summary</text>
  <text x="500" y="575" class="small">/api/graph/{disease}/ui-basic</text>
  <text x="500" y="595" class="small">/api/graph/{disease}/nodes/{node_id}</text>
  <text x="500" y="615" class="small">/api/image-modal/{disease}</text>
  <text x="820" y="575" class="small">/api/structures/*</text>
  <text x="820" y="595" class="small">/search</text>
  <text x="820" y="615" class="small">/api/explanation-context</text>
  <text x="1040" y="575" class="small">/api/assistant/*</text>
  <text x="1040" y="595" class="small">/api/pipeline-runs/*</text>
  <text x="1040" y="615" class="small">/health, /health/search, /health/graph</text>

  <!-- Automation -->
  <rect x="1460" y="125" width="230" height="85" class="box"/>
  <text x="1575" y="148" class="label" text-anchor="middle">S3 Event</text>
  <rect x="1540" y="160" width="70" height="42" rx="8" class="svc-green"/>
  <text x="1575" y="180" class="svc-text">S3</text>
  <text x="1575" y="225" class="tiny" text-anchor="middle">new file / result package</text>

  <rect x="1460" y="250" width="230" height="85" class="box"/>
  <text x="1575" y="273" class="label" text-anchor="middle">AWS Lambda</text>
  <rect x="1540" y="285" width="70" height="42" rx="8" class="svc-orange"/>
  <text x="1575" y="305" class="svc-text">λ</text>

  <rect x="1460" y="375" width="230" height="85" class="box"/>
  <text x="1575" y="398" class="label" text-anchor="middle">Step Functions</text>
  <rect x="1540" y="410" width="70" height="42" rx="8" class="svc-purple"/>
  <text x="1575" y="430" class="svc-text">SFN</text>

  <rect x="1460" y="500" width="230" height="95" class="box"/>
  <text x="1575" y="523" class="label" text-anchor="middle">SageMaker</text>
  <rect x="1540" y="535" width="70" height="42" rx="8" class="svc-teal"/>
  <text x="1575" y="555" class="svc-text">SM</text>
  <text x="1575" y="610" class="tiny" text-anchor="middle">feature-flagged, not launched in v1</text>

  <!-- Governance / RAG -->
  <rect x="170" y="770" width="250" height="115" class="box"/>
  <text x="295" y="795" class="label" text-anchor="middle">RAG Context Package</text>
  <text x="205" y="825" class="small">PostgreSQL facts</text>
  <text x="205" y="845" class="small">Neo4j graph/path score</text>
  <text x="205" y="865" class="small">OpenSearch evidence</text>
  <text x="205" y="885" class="small">AlphaFold links / guardrails</text>

  <rect x="470" y="770" width="210" height="115" class="box"/>
  <text x="575" y="795" class="label" text-anchor="middle">Assistant API</text>
  <rect x="540" y="815" width="70" height="45" rx="8" class="svc-red"/>
  <text x="575" y="837" class="svc-text">CHAT</text>
  <text x="575" y="878" class="tiny" text-anchor="middle">read_only, used_bedrock=false</text>

  <rect x="730" y="770" width="210" height="115" class="dashed"/>
  <text x="835" y="795" class="label" text-anchor="middle">Amazon Bedrock</text>
  <rect x="800" y="815" width="70" height="45" rx="8" class="svc-purple"/>
  <text x="835" y="837" class="svc-text">BR</text>
  <text x="835" y="878" class="tiny" text-anchor="middle">future LLM response generation</text>

  <rect x="1030" y="770" width="240" height="115" class="box"/>
  <text x="1150" y="795" class="label" text-anchor="middle">GitHub Repository</text>
  <text x="1065" y="825" class="small">final-project_data-pipline</text>
  <text x="1065" y="845" class="small">backend mirror</text>
  <text x="1065" y="865" class="small">docs / validation reports</text>

  <rect x="1320" y="770" width="330" height="115" class="dashed"/>
  <text x="1485" y="795" class="label" text-anchor="middle">Google Cloud Storage Backup</text>
  <text x="1360" y="825" class="small">planned migration copy</text>
  <text x="1360" y="845" class="small">AWS S3 -> local archive -> GCS</text>
  <text x="1360" y="865" class="small">no direct cloud-to-cloud transfer</text>

  <!-- Numbered workflow markers -->
  <circle cx="125" cy="190" r="22" class="num"/><text x="125" y="190" class="num-text">1</text>
  <circle cx="410" cy="190" r="22" class="num"/><text x="410" y="190" class="num-text">2</text>
  <circle cx="725" cy="190" r="22" class="num"/><text x="725" y="190" class="num-text">3</text>
  <circle cx="825" cy="330" r="22" class="num"/><text x="825" y="330" class="num-text">4</text>
  <circle cx="1020" cy="485" r="22" class="num"/><text x="1020" y="485" class="num-text">5</text>
  <circle cx="720" cy="690" r="22" class="num"/><text x="720" y="690" class="num-text">6</text>
  <circle cx="1390" cy="150" r="22" class="num"/><text x="1390" y="150" class="num-text">7</text>
  <circle cx="1575" cy="235" r="22" class="num"/><text x="1575" y="235" class="num-text">8</text>
  <circle cx="1575" cy="360" r="22" class="num"/><text x="1575" y="360" class="num-text">9</text>
  <circle cx="1575" cy="485" r="22" class="num"/><text x="1575" y="485" class="num-text">10</text>
  <circle cx="1000" cy="770" r="22" class="num"/><text x="1000" y="770" class="num-text">11</text>
  <circle cx="1295" cy="770" r="22" class="num"/><text x="1295" y="770" class="num-text">12</text>

  <!-- Flows -->
  <path d="M90 225 L170 195" class="flow"/>
  <path d="M390 195 L460 195" class="flow"/>
  <path d="M700 195 L760 195" class="flow"/>
  <path d="M890 265 L890 335" class="flow"/>
  <path d="M800 200 L900 200" class="flow"/>
  <path d="M800 215 L1060 205" class="flow"/>
  <path d="M800 230 L1240 205" class="flow"/>
  <path d="M895 465 L1030 410" class="flow"/>
  <path d="M1070 445 L760 465" class="flow"/>
  <path d="M760 465 L675 465" class="flow"/>
  <path d="M760 465 L465 465" class="flow"/>
  <path d="M760 465 L255 465" class="flow"/>
  <path d="M895 335 L895 300 L1460 165" class="flow-dash"/>
  <path d="M1575 210 L1575 250" class="flow-dash"/>
  <path d="M1575 335 L1575 375" class="flow-dash"/>
  <path d="M1575 460 L1575 500" class="flow-dash"/>
  <path d="M1460 548 L1020 460" class="flow-dash"/>
  <path d="M890 640 L575 770" class="flow-blue"/>
  <path d="M890 640 L295 770" class="flow-blue"/>
  <path d="M680 827 L730 827" class="flow-dash"/>
  <path d="M90 770 L170 827" class="flow"/>
  <path d="M1270 827 L1320 827" class="flow-dash"/>
  <path d="M990 405 L1320 805" class="flow-dash"/>

  <!-- Workflow text -->
  <text x="130" y="115" class="note">1. Researcher opens React UI</text>
  <text x="350" y="115" class="note">2. Frontend calls FastAPI</text>
  <text x="650" y="115" class="note">3. Backend serves normalized APIs</text>
  <text x="895" y="310" class="note">4. API reads DB / KG / Search / S3</text>
  <text x="1010" y="525" class="note">5. Loaders build DB, KG, search index</text>
  <text x="500" y="700" class="note">6. Explanation and assistant context for RAG/chatbot</text>
  <text x="1375" y="130" class="note">7-10. Future S3-triggered SageMaker workflow</text>
  <text x="940" y="750" class="note">11. Bedrock planned</text>
  <text x="1240" y="750" class="note">12. GitHub/S3/GCS handoff and backup</text>
</svg>
